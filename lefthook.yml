# Git hook 配置 — Skill 子模块。
# 2026-07-02 补 pytest schema 单测(tests/),保护 SKILL.md 里下游 skills 依赖
# 的字段/section 契约不被无意破坏。
#
# 注意:本仓也作为 backend-service 的子模块(.openclaw-user-service/skills),但子模块
# 操作走父仓 git 命令时不触发本 hook;只有 ~/weight-loss-skill 独立 clone 里直接
# commit/push 才触发——本 pre-push 就是保护那个场景。
# backend-service 那边 tests/onboarding.test.ts 有更全的检查(依赖父仓 workspace/
# 和 workspace-manager.ts),两处互补。

pre-commit:
  parallel: true
  commands:
    secret-detect:
      run: |
        if git diff --cached --diff-filter=ACM -z --name-only | xargs -0 grep -lE '(AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{48}|-----BEGIN (RSA |EC )?PRIVATE KEY|ghp_[a-zA-Z0-9]{36})' 2>/dev/null; then
          echo "⚠️  疑似密钥泄露,请检查暂存文件"
          exit 1
        fi
    trailing-whitespace:
      run: |
        if git diff --cached --check 2>/dev/null | grep -q 'trailing whitespace'; then
          echo "⚠️  存在尾部空白"
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    # 本仓 pytest:154 case,覆盖每个 skill 的计算/判定纯函数
    # (streak/weight-tracker/planner/nutrition/badge/exercise/trend + onboarding schema)
    skill-tests:
      run: python3 -m pytest tests/ -q
      fail_text: |
        ❌ skill 单测失败,禁止 push。
        修法:`python3 -m pytest tests/ -v` 看哪些 case 挂。
        改 skill/scripts/*.py 里的公式/判定/归一化时,请配对更新 tests/test_*.py。

    # 父仓 vitest:onboarding SKILL.md schema 契约(下游 skills 引用的字段/section)
    # 通过 SKILL_ROOT env 指到本地 clone,避免"父仓子模块指针没 bump 读老版本"漂移。
    # 找不到父仓 clone 时静默 skip(本仓 tests/test_onboarding_schema.py 20 case 覆盖核心)。
    parent-onboarding-contract:
      run: |
        PARENT_CANDIDATES=(
          "$(dirname "$(pwd)")/backend-service/.openclaw-user-service"
          "$HOME/backend-service/.openclaw-user-service"
        )
        for parent in "${PARENT_CANDIDATES[@]}"; do
          if [ -f "$parent/tests/onboarding.test.ts" ] && command -v npx >/dev/null; then
            echo "→ 找到父仓,跑完整 vitest:$parent"
            cd "$parent" && SKILL_ROOT="$(pwd)/../../weight-loss-skill" npx vitest run tests/onboarding.test.ts
            exit $?
          fi
        done
        echo "→ 未找到父仓 clone,skip(本仓 pytest 已覆盖核心 schema)"
        exit 0
      fail_text: |
        ❌ 父仓 onboarding schema 测挂了。
        如果改了 user-onboarding-profile/SKILL.md 字段名,需同步更新下游 skills
        里的引用(weight-loss-planner / meal-tracker / diet-pattern-detection ...)
        然后到 backend-service 更新 tests/onboarding.test.ts 的 REQUIRED_FIELDS。
