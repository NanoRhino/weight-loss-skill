<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<!-- Daily Diet Card — self-contained, mobile-friendly, shareable -->
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    font-size: 15px;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
    color: #1a1a1a;
    background: #f0f4e8;
    padding: 0;
    margin: 0;
  }

  .page {
    max-width: 480px;
    margin: 0 auto;
    padding: 1.5rem 1rem 2rem;
  }

  /* ===== Header ===== */
  .card-header {
    text-align: center;
    margin-bottom: 1.2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid #d4e0c0;
  }

  .card-header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #2d5016;
    margin-bottom: 0.2rem;
  }

  .card-header .date {
    font-size: 0.9rem;
    color: #666;
  }

  .card-header .name {
    font-size: 0.85rem;
    color: #888;
    margin-top: 0.15rem;
  }

  /* ===== Summary Bar ===== */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    margin-bottom: 1.2rem;
  }

  .summary-item {
    background: #fff;
    border-radius: 10px;
    padding: 0.6rem 0.4rem;
    text-align: center;
    border: 1px solid #e0ddd5;
  }

  .summary-item .value {
    font-size: 1.15rem;
    font-weight: 700;
    color: #2d5016;
  }

  .summary-item .label {
    font-size: 0.7rem;
    color: #888;
    margin-top: 0.1rem;
  }

  .summary-item.over .value { color: #dc2626; }
  .summary-item.under .value { color: #f59e0b; }
  .summary-item.ok .value { color: #16a34a; }

  /* ===== Calorie Progress ===== */
  .calorie-progress {
    background: #fff;
    border-radius: 10px;
    padding: 0.8rem 1rem;
    margin-bottom: 1.2rem;
    border: 1px solid #e0ddd5;
  }

  .calorie-progress .label-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: #666;
    margin-bottom: 0.4rem;
  }

  .progress-bar {
    height: 10px;
    background: #e8e5dd;
    border-radius: 5px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.3s;
  }

  .progress-bar-fill.ok { background: linear-gradient(90deg, #4ade80, #16a34a); }
  .progress-bar-fill.over { background: linear-gradient(90deg, #fbbf24, #f87171); }
  .progress-bar-fill.under { background: linear-gradient(90deg, #93c5fd, #60a5fa); }

  .calorie-status {
    font-size: 0.78rem;
    color: #888;
    text-align: right;
    margin-top: 0.3rem;
  }

  /* ===== Meal Cards ===== */
  .meal-card {
    background: #fff;
    border-radius: 10px;
    margin-bottom: 0.8rem;
    border: 1px solid #e0ddd5;
    overflow: hidden;
  }

  .meal-title {
    padding: 0.5rem 0.8rem;
    font-size: 0.92rem;
    font-weight: 600;
    color: #2d5016;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #f0ede5;
  }

  .meal-title .meal-cal {
    font-size: 0.85rem;
    font-weight: 600;
    color: #555;
  }

  .meal-foods {
    padding: 0.4rem 0.8rem 0.5rem;
  }

  .food-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.25rem 0;
    font-size: 0.85rem;
    color: #444;
  }

  .food-item:not(:last-child) {
    border-bottom: 1px solid #f5f3ed;
  }

  .food-name {
    flex: 1;
  }

  .food-amount {
    color: #999;
    font-size: 0.78rem;
    margin-left: 0.5rem;
    white-space: nowrap;
  }

  .food-cal {
    color: #666;
    font-size: 0.82rem;
    margin-left: 0.5rem;
    font-weight: 500;
    white-space: nowrap;
  }

  /* ===== Macro Breakdown ===== */
  .macro-row {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
  }

  .macro-pill {
    background: #fff;
    border-radius: 20px;
    padding: 0.35rem 0.8rem;
    font-size: 0.8rem;
    color: #555;
    border: 1px solid #e0ddd5;
  }

  .macro-pill strong {
    color: #2d5016;
  }

  /* ===== Footer ===== */
  .card-footer {
    text-align: center;
    margin-top: 1.2rem;
    padding-top: 0.8rem;
    border-top: 1px solid #d4e0c0;
    font-size: 0.75rem;
    color: #aaa;
  }

  /* ===== Responsive ===== */
  @media (max-width: 400px) {
    html { font-size: 13px; }
    .page { padding: 1rem 0.7rem; }
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="card-header">
    <h1>{{TITLE}}</h1>
    <div class="date">{{DATE_DISPLAY}}</div>
    <div class="name">{{USER_NAME}}</div>
  </header>

  <!-- SUMMARY BAR -->
  <div class="summary-bar">
    <div class="summary-item {{CAL_STATUS}}">
      <div class="value">{{TOTAL_CAL}}</div>
      <div class="label">{{CAL_UNIT}}</div>
    </div>
    <div class="summary-item">
      <div class="value">{{TOTAL_PROTEIN}}</div>
      <div class="label">{{PROTEIN_LABEL}}</div>
    </div>
    <div class="summary-item">
      <div class="value">{{TOTAL_CARBS}}</div>
      <div class="label">{{CARBS_LABEL}}</div>
    </div>
    <div class="summary-item">
      <div class="value">{{TOTAL_FAT}}</div>
      <div class="label">{{FAT_LABEL}}</div>
    </div>
  </div>

  {{CALORIE_PROGRESS_SECTION}}

  {{MEAL_CARDS}}

  <!-- FOOTER -->
  <footer class="card-footer">
    {{FOOTER_TEXT}}
  </footer>

</div>
</body>
</html>
