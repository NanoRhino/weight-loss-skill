<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<!-- Daily Diet Card — self-contained, mobile-friendly, shareable -->
<style>
  @page {
    size: 480px;
    margin: 0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    font-size: 15px;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                 "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
    color: #1a1a1a;
    background: #f0f4e8;
    padding: 0;
    margin: 0;
  }

  .page {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 32px;
  }

  /* ===== Header ===== */
  .card-header {
    text-align: center;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 2px solid #d4e0c0;
  }

  .card-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #2d5016;
    margin-bottom: 3px;
  }

  .card-header .date {
    font-size: 13px;
    color: #666;
  }

  .card-header .name {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  /* ===== Summary Bar (table layout for WeasyPrint compat) ===== */
  .summary-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 6px 0;
    margin-bottom: 16px;
  }

  .summary-table td {
    background: #fff;
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
    border: 1px solid #e0ddd5;
    width: 25%;
  }

  .summary-table .value {
    font-size: 17px;
    font-weight: 700;
    color: #2d5016;
    display: block;
  }

  .summary-table .label {
    font-size: 10px;
    color: #888;
    display: block;
    margin-top: 1px;
  }

  .summary-table .over .value { color: #dc2626; }
  .summary-table .under .value { color: #f59e0b; }
  .summary-table .ok .value { color: #16a34a; }

  /* ===== Calorie Progress ===== */
  .calorie-progress {
    background: #fff;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    border: 1px solid #e0ddd5;
  }

  .label-row {
    font-size: 12px;
    color: #666;
    margin-bottom: 6px;
  }

  .label-row .left { float: left; }
  .label-row .right { float: right; }
  .label-row::after { content: ""; display: table; clear: both; }

  .progress-bar {
    height: 10px;
    background: #e8e5dd;
    border-radius: 5px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 5px;
  }

  .progress-bar-fill.ok { background: #16a34a; }
  .progress-bar-fill.over { background: #f87171; }
  .progress-bar-fill.under { background: #60a5fa; }

  .calorie-status {
    font-size: 11px;
    color: #888;
    text-align: right;
    margin-top: 4px;
  }

  /* ===== Meal Cards ===== */
  .meal-card {
    background: #fff;
    border-radius: 10px;
    margin-bottom: 10px;
    border: 1px solid #e0ddd5;
    overflow: hidden;
  }

  .meal-title {
    padding: 7px 12px;
    font-size: 14px;
    font-weight: 600;
    color: #2d5016;
    border-bottom: 1px solid #f0ede5;
  }

  .meal-title .meal-cal {
    float: right;
    font-size: 13px;
    font-weight: 600;
    color: #555;
  }

  .meal-title::after { content: ""; display: table; clear: both; }

  .food-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    color: #444;
  }

  .food-table td {
    padding: 4px 12px;
    border-bottom: 1px solid #f5f3ed;
  }

  .food-table tr:last-child td {
    border-bottom: none;
  }

  .food-table .food-name {
    /* takes remaining space */
  }

  .food-table .food-amount {
    color: #999;
    font-size: 11px;
    text-align: right;
    white-space: nowrap;
    width: 50px;
  }

  .food-table .food-cal {
    color: #666;
    font-size: 12px;
    font-weight: 500;
    text-align: right;
    white-space: nowrap;
    width: 70px;
  }

  /* ===== Footer ===== */
  .card-footer {
    text-align: center;
    margin-top: 16px;
    padding-top: 10px;
    border-top: 1px solid #d4e0c0;
    font-size: 11px;
    color: #aaa;
  }

  /* ===== Responsive (browser only, not WeasyPrint) ===== */
  @media screen and (max-width: 400px) {
    html { font-size: 13px; }
    .page { padding: 14px 10px; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="card-header">
    <h1>{{TITLE}}</h1>
    <div class="date">{{DATE_DISPLAY}}</div>
    <div class="name">{{USER_NAME}}</div>
  </header>

  <!-- SUMMARY BAR -->
  <table class="summary-table"><tr>
    <td class="{{CAL_STATUS}}">
      <span class="value">{{TOTAL_CAL}}</span>
      <span class="label">{{CAL_UNIT}}</span>
    </td>
    <td>
      <span class="value">{{TOTAL_PROTEIN}}</span>
      <span class="label">{{PROTEIN_LABEL}}</span>
    </td>
    <td>
      <span class="value">{{TOTAL_CARBS}}</span>
      <span class="label">{{CARBS_LABEL}}</span>
    </td>
    <td>
      <span class="value">{{TOTAL_FAT}}</span>
      <span class="label">{{FAT_LABEL}}</span>
    </td>
  </tr></table>

  {{CALORIE_PROGRESS_SECTION}}

  {{MEAL_CARDS}}

  <!-- FOOTER -->
  <footer class="card-footer">
    {{FOOTER_TEXT}}
  </footer>

</div>
</body>
</html>
